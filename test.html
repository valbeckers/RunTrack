
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: white; font-family: sans-serif; }
    .info { position: fixed; top: 60px; left: 0; right: 0; background: rgba(255,255,255,0.1); padding: 16px; font-size: 13px; line-height: 2; }
    .nav { position: fixed; bottom: 0; left: 0; right: 0; background: #e8ff47; color: black; display: flex; align-items: center; height: 60px; }
    .nav span { flex: 1; text-align: center; font-size: 13px; font-weight: bold; }
  </style>
</head>
<body>
<div class="info" id="info">Calcul...</div>
<nav class="nav" id="nav">
  <span>🏠</span><span>⏺</span><span>📅</span>
</nav>
<script>
requestAnimationFrame(() => {
  const probe = document.createElement('div');
  probe.style.cssText = 'position:fixed;bottom:0;left:0;width:1px;height:env(safe-area-inset-bottom,0px);pointer-events:none;';
  document.body.appendChild(probe);
  const envVal = probe.getBoundingClientRect().height;
  document.body.removeChild(probe);

  const vv = window.visualViewport;
  const vvDiff = vv ? (window.innerHeight - vv.height) : 'N/A';
  const screenDiff = screen.height - window.innerHeight;
  const nav = document.getElementById('nav');
  const navRect = nav.getBoundingClientRect();

  // Détecte iPhone avec home bar
  const isHomeBar = /iPhone/.test(navigator.userAgent) && screen.height >= 812;
  const safeGuess = isHomeBar ? 34 : 0;

  // Applique le fix JS
  const safe = envVal > 0 ? envVal : safeGuess;
  if (safe > 0) {
    nav.style.height = (60 + safe) + 'px';
    nav.style.paddingBottom = safe + 'px';
    nav.style.alignItems = 'center';
  }

  document.getElementById('info').innerHTML = `
    <b>env() probe:</b> ${envVal}px<br>
    <b>screen.height:</b> ${screen.height}px<br>
    <b>window.innerHeight:</b> ${window.innerHeight}px<br>
    <b>screen - inner:</b> ${screenDiff}px<br>
    <b>visualViewport diff:</b> ${vvDiff}px<br>
    <b>standalone:</b> ${navigator.standalone ? 'OUI ✅' : 'NON ❌'}<br>
    <b>isHomeBar device:</b> ${isHomeBar ? 'OUI ✅' : 'NON ❌'}<br>
    <b>safe appliqué:</b> ${safe}px<br>
    <b>nav.height après fix:</b> ${nav.getBoundingClientRect().height.toFixed(1)}px
  `;
});
</script>
</body>
</html>
