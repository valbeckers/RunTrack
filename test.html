<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: white; font-family: sans-serif; }

    /* Test 1 : nav simple avec env() */
    .nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #e8ff47;
      color: black;
      display: flex;
      align-items: center;
      height: calc(60px + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav span {
      flex: 1;
      text-align: center;
      font-size: 13px;
      font-weight: bold;
    }

    /* Debug info */
    .info {
      position: fixed;
      top: 60px; left: 0; right: 0;
      background: rgba(255,255,255,0.1);
      padding: 16px;
      font-size: 13px;
      line-height: 1.8;
    }
  </style>
</head>
<body>

<div class="info" id="info">Calcul en cours...</div>

<nav class="nav">
  <span>🏠 Accueil</span>
  <span>⏺ Record</span>
  <span>📅 Historique</span>
</nav>

<script>
const info = document.getElementById('info');

// Probe pour lire env(safe-area-inset-bottom)
const probe = document.createElement('div');
probe.style.cssText = 'position:fixed;bottom:0;left:0;width:1px;height:env(safe-area-inset-bottom,0px);pointer-events:none;';
document.body.appendChild(probe);

requestAnimationFrame(() => {
  const safeBottom = probe.getBoundingClientRect().height;
  const winH = window.innerHeight;
  const screenH = screen.height;
  const nav = document.querySelector('.nav');
  const navRect = nav.getBoundingClientRect();

  info.innerHTML = `
    <b>safe-area-inset-bottom (probe):</b> ${safeBottom}px<br>
    <b>window.innerHeight:</b> ${winH}px<br>
    <b>screen.height:</b> ${screenH}px<br>
    <b>nav height (getBoundingClientRect):</b> ${navRect.height.toFixed(1)}px<br>
    <b>nav bottom:</b> ${navRect.bottom.toFixed(1)}px<br>
    <b>standalone mode:</b> ${window.navigator.standalone ? 'OUI ✅' : 'NON ❌'}<br>
    <b>CSS env() support:</b> ${CSS.supports('padding-bottom', 'env(safe-area-inset-bottom)') ? 'OUI ✅' : 'NON ❌'}
  `;
});
</script>
</body>
</html>
